<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recivu API Changelog</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
      body {
        font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem 4rem;
        color: #1a1a1a;
      }
      h1 {
        font-size: 1.6rem;
        margin-bottom: 0.5rem;
      }
      h2 {
        font-size: 1.2rem;
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid #eee;
      }
      h3 {
        font-size: 1rem;
        color: #555;
        margin-top: 1.2rem;
        margin-bottom: 0.4rem;
      }
      ul {
        padding-left: 1.4rem;
      }
      li + li {
        margin-top: 0.3rem;
      }
      code {
        background: #f4f4f4;
        padding: 0.1em 0.3em;
        border-radius: 3px;
        font-size: 0.92em;
      }
      a {
        color: #0a58ca;
      }
      .back {
        display: inline-block;
        margin-bottom: 1rem;
        font-size: 0.9rem;
        color: #555;
        text-decoration: none;
      }
      .back:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <a class="back" href="/">&larr; API spec</a>
    <div id="content">Loading&hellip;</div>
    <script src="https://unpkg.com/marked@15/marked.min.js"></script>
    <script>
      const slug = (s) =>
        String(s)
          .toLowerCase()
          .replace(/[\[\]]/g, "")
          .replace(/[^\w]+/g, "-")
          .replace(/^-+|-+$/g, "");

      const renderer = new marked.Renderer();
      renderer.heading = ({ text, depth }) => {
        const id = slug(text);
        return `<h${depth} id="${id}">${text}</h${depth}>\n`;
      };

      fetch("CHANGELOG.md", { cache: "no-cache" })
        .then((r) => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.text();
        })
        .then((md) => {
          document.getElementById("content").innerHTML = marked.parse(md, {
            renderer,
          });
          if (location.hash) {
            const target = document.getElementById(
              location.hash.slice(1)
            );
            if (target) target.scrollIntoView();
          }
        })
        .catch(() => {
          document.getElementById("content").textContent =
            "Failed to load CHANGELOG.md";
        });
    </script>
  </body>
</html>
